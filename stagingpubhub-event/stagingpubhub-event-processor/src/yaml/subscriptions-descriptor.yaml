subscriptions_descriptor:
  spec_version: 1.0.0
  service: stagingpubhub
  service_component: EVENT_PROCESSOR
  subscriptions:
    - name: event processor subscription
      events:
        - name: stagingpubhub.event.publish-requested
          schema_uri: http://justice.gov.uk/staging/pubhub/publish-requested.json

        - name: stagingpubhub.event.sjp-public-published
          schema_uri: http://justice.gov.uk/staging/pubhub/sjp.public-report-generated.json

        - name: stagingpubhub.event.sjp-press-published
          schema_uri: http://justice.gov.uk/staging/pubhub/sjp.press-transparency-report-generated.json

        - name: stagingpubhub.event.publish-live-status
          schema_uri: http://justice.gov.uk/staging/pubhub/json/schema/publish-live-status.json

      event_source_name: stagingpubhub

    - name: public events
      events:
        - name: public.sjp.case-document-uploaded
          schema_uri: http://justice.gov.uk/json/schemas/domains/sjp_public/events/case-document-uploaded.json

        - name: public.sjp.pending-cases-public-list-generated
          schema_uri: http://cpp.moj.gov.uk/sjp/json/schema/event/public.sjp.pending-cases-public-list-generated.json

        - name: public.sjp.press-transparency-report-generated
          schema_uri: http://cpp.moj.gov.uk/sjp/json/schema/event/public.sjp.press-transparency-report-generated.json

        - name: public.hearing.live-status-published
          schema_uri: http://justice.gov.uk/hearing/commands/public.hearing.live-status-published.json

        - name: public.sjp.pending-cases-public-list-generated
          schema_uri: http://cpp.moj.gov.uk/sjp/json/schema/event/public.sjp.pending-cases-public-list-generated.json

      event_source_name: public
